<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Plinko Game</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #18222d;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      transition: background 0.3s ease, color 0.3s ease;
      user-select: none;
      -webkit-user-select: none;
    }

    /* === СВЕТЛАЯ ТЕМА === */
    body.light-theme {
      background: #eef2f5;
      color: #111;
    }
    body.light-theme #score-board { color: #111; }
    body.light-theme canvas {
      background: #ffffff;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }
    body.light-theme .hint { color: #657786; }
    body.light-theme .modal-box {
      background: #ffffff;
      color: #111;
    }
    body.light-theme .modal-text { color: #111; }
    body.light-theme .feedback-textarea {
      background: #f0f2f5 !important;
      color: #111 !important;
      border-color: rgba(0,0,0,0.15) !important;
    }

    /* === ВЕРХНЯЯ ПАНЕЛЬ И КНОПКИ === */
    .settings-btn {
      position: absolute;
      top: 10px;
      left: 12px;
      font-size: 22px;
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0.85;
      z-index: 500;
      padding: 6px;
      transition: transform 0.2s ease;
    }
    .settings-btn:active {
      transform: scale(0.9) rotate(45deg);
    }

    .menu-tab-btn {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 6px 18px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      z-index: 500;
      backdrop-filter: blur(4px);
      transition: background 0.2s ease, transform 0.1s ease;
    }
    .menu-tab-btn:active {
      transform: translateX(-50%) scale(0.95);
    }
    body.light-theme .menu-tab-btn {
      background: rgba(0, 0, 0, 0.08);
      border-color: rgba(0, 0, 0, 0.15);
      color: #111;
    }

    .app-version {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      font-family: monospace;
      pointer-events: none;
    }
    body.light-theme .app-version {
      color: rgba(0, 0, 0, 0.4);
    }

    #score-board {
      font-size: 20px;
      margin-bottom: 10px;
      font-weight: bold;
      display: inline-block;
      margin-top: 40px;
    }
    canvas {
      background: #10171e;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      touch-action: none;
      cursor: pointer;
    }
    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: #8e9ca8;
    }

    /* === МОДАЛЬНЫЕ ОКНА === */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(4px);
    }

    .modal-box {
      position: relative;
      background: #242f3d;
      padding: 24px 20px;
      border-radius: 16px;
      text-align: center;
      max-width: 290px;
      width: 88%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .rainbow-border-wrapper {
      padding: 2px;
      border-radius: 18px;
      background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #00ff00, #00afff, #7a00ff, #ff00c8, #ff0000);
      background-size: 400%;
      animation: rainbowGlow 8s linear infinite;
      max-width: 310px;
      width: 88%;
    }

    .black-modal-content {
      position: relative;
      background: #000000 !important;
      color: #ffffff;
      padding: 24px 20px;
      border-radius: 16px;
      text-align: center;
      width: 100%;
    }

    @keyframes rainbowGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 14px;
      background: none;
      border: none;
      font-size: 22px;
      color: #8e9ca8;
      cursor: pointer;
    }

    .modal-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #ffffff;
    }

    .setting-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #ffffff;
    }

    .theme-toggle {
      display: flex;
      width: 100%;
      background: #111111;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      padding: 3px;
      gap: 4px;
    }

    .theme-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      color: #8e9ca8;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .theme-btn.active {
      background: #2ea6ff;
      color: #fff;
      font-weight: bold;
    }

    .feedback-textarea {
      width: 100%;
      height: 90px;
      background: #111111;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      padding: 10px;
      font-family: inherit;
      font-size: 13px;
      resize: none;
      outline: none;
      margin-bottom: 12px;
    }

    .danger-zone {
      margin-top: 15px;
      padding: 12px;
      background: rgba(244, 67, 54, 0.1);
      border: 1px solid #f44336;
      border-radius: 12px;
      text-align: left;
    }
    .danger-header {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: bold;
      color: #ff5252;
      margin-bottom: 10px;
    }

    .modal-text {
      font-size: 16px;
      line-height: 1.4;
      margin-bottom: 20px;
      color: #f5f5f5;
    }

    .modal-btn {
      background: #2ea6ff;
      color: #fff;
      border: none;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s ease, transform 0.1s ease;
    }
    .modal-btn:active { transform: scale(0.96); }
    .modal-btn-danger { background: #f44336; }
    .modal-btn-secondary { background: #37474f; }

    .modal-buttons-row {
      display: flex;
      gap: 10px;
    }

    .floating-score {
      position: absolute;
      font-weight: 900;
      font-size: 22px;
      pointer-events: none;
      z-index: 1000;
      animation: floatUp 0.8s ease-out forwards;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
    }

    @keyframes floatUp {
      0% { opacity: 0; transform: translate(-50%, 0) scale(0.6); }
      30% { opacity: 1; transform: translate(-50%, -20px) scale(1.3); }
      100% { opacity: 0; transform: translate(-50%, -50px) scale(1); }
    }
  </style>
</head>
<body>

  <button id="settings-btn" class="settings-btn" title="Настройки">⚙️</button>
  <button id="menu-tab-btn" class="menu-tab-btn">Меню</button>
  <div class="app-version">v1.0.14</div>

  <div id="score-board">Счет: <span id="score">100</span></div>
  <canvas id="gameCanvas" width="360" height="520"></canvas>
  <div class="hint">Нажми на игровое поле, чтобы сбросить шарик (-10)</div>

  <!-- Окно Меню -->
  <div id="menu-modal" class="modal-overlay">
    <div class="modal-box">
      <button id="close-menu" class="close-btn">&times;</button>
      <div class="modal-title">📋 Меню</div>
      <div style="font-size: 20px; font-weight: 900; color: #ff9800; margin: 18px 0 6px 0;">
        COMING SOON
      </div>
      <div style="font-size: 13px; color: #8e9ca8;">Этот раздел находится в разработке</div>
    </div>
  </div>

  <!-- Окно обратной связи -->
  <div id="feedback-modal" class="modal-overlay">
    <div class="modal-box">
      <button id="close-feedback" class="close-btn">&times;</button>
      <div class="modal-title">💡 Идея или Баг</div>
      <textarea id="feedback-text" class="feedback-textarea" placeholder="Опишите вашу идею или найденную ошибку..."></textarea>
      <button id="send-feedback-btn" class="modal-btn">Отправить</button>
    </div>
  </div>

  <!-- Окно настроек -->
  <div id="settings-modal" class="modal-overlay">
    <div class="rainbow-border-wrapper">
      <div class="black-modal-content">
        <button id="close-settings" class="close-btn">&times;</button>
        <div class="modal-title">⚙️ Настройки</div>

        <div class="setting-item">
          <span>Тема оформления:</span>
          <div class="theme-toggle">
            <button id="theme-dark-btn" class="theme-btn active">🌙 Тёмная</button>
            <button id="theme-light-btn" class="theme-btn">☀️ Светлая</button>
          </div>
        </div>

        <div class="setting-item">
          <span>Обратная связь:</span>
          <button id="open-feedback-btn" class="modal-btn modal-btn-secondary">💡 Идея / Сообщить о баге</button>
        </div>

        <div class="danger-zone">
          <div class="danger-header">
            <span>❗</span>
            <span>Опасная зона</span>
          </div>
          <button id="open-confirm-reset" class="modal-btn modal-btn-danger">Сбросить счёт</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Подтверждение сброса -->
  <div id="confirm-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-text">Точно ли ты хочешь сбросить счёт до 100?</div>
      <div class="modal-buttons-row">
        <button id="confirm-yes" class="modal-btn modal-btn-danger">Да</button>
        <button id="confirm-no" class="modal-btn modal-btn-secondary">Отмена</button>
      </div>
    </div>
  </div>

  <!-- Окно проигрыша -->
  <div id="reset-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-text">Вы потеряли весь счёт, можете сбросить его до 100</div>
      <button id="reset-btn" class="modal-btn">Сбросить до 100</button>
    </div>
  </div>

  <script>
    // 0. ЭКРАННЫЙ УЛОВИТЕЛЬ ОШИБОК
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      const errDiv = document.createElement('div');
      errDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:rgba(255,0,0,0.95);color:#fff;padding:12px;font-size:12px;z-index:99999;word-break:break-all;font-family:monospace;';
      errDiv.innerText = '⚠️ Ошибка JS (Стр ' + lineNo + '): ' + msg;
      document.body.appendChild(errDiv);
      return false;
    };

    // БЕЗОПАСНАЯ РАБОТА С ХРАНИЛИЩЕМ
    const safeStorage = {
      getItem: (key) => {
        try { return localStorage.getItem(key); } catch (e) { return null; }
      },
      setItem: (key, value) => {
        try { localStorage.setItem(key, value); } catch (e) {}
      }
    };

    // ИНИЦИАЛИЗАЦИЯ TELEGRAM WEBAPP
    let tg = null;
    try {
      if (window.Telegram && window.Telegram.WebApp) {
        tg = window.Telegram.WebApp;
        if (tg.ready) tg.ready();
        if (tg.expand) tg.expand();
      }
    } catch (e) {
      console.warn('Telegram WebApp init bypass:', e);
    }

    // 1. DOM ЭЛЕМЕНТЫ
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    const settingsBtn = document.getElementById('settings-btn');
    const settingsModal = document.getElementById('settings-modal');
    const closeSettings = document.getElementById('close-settings');
    const openConfirmReset = document.getElementById('open-confirm-reset');

    const menuTabBtn = document.getElementById('menu-tab-btn');
    const menuModal = document.getElementById('menu-modal');
    const closeMenu = document.getElementById('close-menu');

    const openFeedbackBtn = document.getElementById('open-feedback-btn');
    const feedbackModal = document.getElementById('feedback-modal');
    const closeFeedback = document.getElementById('close-feedback');
    const sendFeedbackBtn = document.getElementById('send-feedback-btn');
    const feedbackText = document.getElementById('feedback-text');

    const confirmModal = document.getElementById('confirm-modal');
    const confirmYes = document.getElementById('confirm-yes');
    const confirmNo = document.getElementById('confirm-no');

    const resetModal = document.getElementById('reset-modal');
    const resetBtn = document.getElementById('reset-btn');

    const themeDarkBtn = document.getElementById('theme-dark-btn');
    const themeLightBtn = document.getElementById('theme-light-btn');

    // 2. СОСТОЯНИЕ И КОНСТАНТЫ ФИЗИКИ
    let score = 100;
    let saveTimeout = null;
    let currentTheme = safeStorage.getItem('plinko_theme') || 'dark';

    const ROWS = 7;
    const PEG_RADIUS = 4;
    const BALL_RADIUS = 7;
    const GRAVITY = 0.25;
    const RESTITUTION = 0.5;

    const MULTIPLIERS = [0, 2, 3, 5, 3, 2, 0];
    const COLORS = ['#546e7a', '#ff9800', '#f44336', '#e91e63', '#f44336', '#ff9800', '#546e7a'];

    const pegs = [];
    const balls = [];

    const startY = 80;
    const rowSpacing = 45;
    const colSpacing = 38;

    // Генерируем колышки
    for (let r = 0; r < ROWS; r++) {
      const count = r + 3;
      const startX = (canvas.width - (count - 1) * colSpacing) / 2;
      for (let c = 0; c < count; c++) {
        pegs.push({ x: startX + c * colSpacing, y: startY + r * rowSpacing });
      }
    }

    // 3. ФУНКЦИИ ИГРЫ
    const applyTheme = (theme) => {
      try {
        currentTheme = theme;
        safeStorage.setItem('plinko_theme', theme);
        if (theme === 'light') {
          document.body.classList.add('light-theme');
          themeDarkBtn.classList.remove('active');
          themeLightBtn.classList.add('active');
        } else {
          document.body.classList.remove('light-theme');
          themeLightBtn.classList.remove('active');
          themeDarkBtn.classList.add('active');
        }
      } catch(e) {}
    };

    const checkGameOver = () => {
      if (score < 10 && balls.length === 0) {
        resetModal.style.display = 'flex';
      }
    };

    const loadScore = () => {
      const localSaved = safeStorage.getItem('plinko_score');
      if (localSaved !== null) {
        score = parseInt(localSaved, 10);
        scoreEl.innerText = score;
      }

      try {
        if (tg && tg.CloudStorage && typeof tg.CloudStorage.getItem === 'function') {
          tg.CloudStorage.getItem('plinko_score', (err, value) => {
            if (!err && value) {
              score = parseInt(value, 10);
              scoreEl.innerText = score;
              safeStorage.setItem('plinko_score', score.toString());
            }
            checkGameOver();
          });
          return;
        }
      } catch (e) {
        console.warn('CloudStorage fail:', e);
      }
      checkGameOver();
    };

    const forceSaveCloud = () => {
      try {
        if (tg && tg.CloudStorage && typeof tg.CloudStorage.setItem === 'function') {
          tg.CloudStorage.setItem('plinko_score', score.toString(), (err) => {});
        }
      } catch(e) {}
    };

    const saveScore = () => {
      safeStorage.setItem('plinko_score', score.toString());
      if (saveTimeout) clearTimeout(saveTimeout);
      saveTimeout = setTimeout(forceSaveCloud, 500);
    };

    const sendFeedback = () => {
      const text = feedbackText.value.trim();
      if (!text) {
        alert("Пожалуйста, введите текст сообщения.");
        return;
      }

      const payload = { type: 'feedback', text };

      try {
        if (tg && typeof tg.sendData === 'function') {
          tg.sendData(JSON.stringify(payload));
          feedbackModal.style.display = 'none';
          feedbackText.value = '';
          alert("Отзыв отправлен!");
          return;
        }
      } catch (err) {
        alert("Отправка доступна при запуске с клавиатуры Telegram!");
        return;
      }
      alert("Отправка работает внутри открытого Telegram WebApp!");
    };

    const getSlotIndex = (x) => {
      const slotWidth = canvas.width / MULTIPLIERS.length;
      const idx = Math.floor(x / slotWidth);
      return Math.max(0, Math.min(MULTIPLIERS.length - 1, idx));
    };

    const showFloatingScore = (x, y, points, color) => {
      const el = document.createElement('div');
      el.className = 'floating-score';
      el.innerText = `+${points}`;
      el.style.color = color;
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      document.body.appendChild(el);

      setTimeout(() => el.remove(), 800);
    };

    const update = () => {
      for (let i = balls.length - 1; i >= 0; i--) {
        const b = balls[i];
        b.vy += GRAVITY;
        b.x += b.vx;
        b.y += b.vy;

        if (b.x - BALL_RADIUS < 0) { b.x = BALL_RADIUS; b.vx *= -RESTITUTION; }
        if (b.x + BALL_RADIUS > canvas.width) { b.x = canvas.width - BALL_RADIUS; b.vx *= -RESTITUTION; }

        pegs.forEach(p => {
          const dx = b.x - p.x;
          const dy = b.y - p.y;
          const dist = Math.hypot(dx, dy);
          const minDist = BALL_RADIUS + PEG_RADIUS;

          if (dist < minDist) {
            const angle = Math.atan2(dy, dx);
            const overlap = minDist - dist;
            b.x += Math.cos(angle) * overlap;
            b.y += Math.sin(angle) * overlap;

            const speed = Math.hypot(b.vx, b.vy) * RESTITUTION;
            b.vx = Math.cos(angle) * speed + (Math.random() - 0.5) * 0.5;
            b.vy = Math.sin(angle) * speed;
          }
        });

        if (b.y + BALL_RADIUS >= canvas.height - 40) {
          const slotIdx = getSlotIndex(b.x);
          const mult = MULTIPLIERS[slotIdx];
          const gained = 10 * mult;

          score += gained;
          scoreEl.innerText = score;
          saveScore();

          const rect = canvas.getBoundingClientRect();
          const slotWidth = canvas.width / MULTIPLIERS.length;
          const popupX = rect.left + (slotIdx + 0.5) * slotWidth;
          const popupY = rect.top + (canvas.height - 40);

          showFloatingScore(popupX, popupY, gained, COLORS[slotIdx]);

          balls.splice(i, 1);
          checkGameOver();
        }
      }
    };

    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = currentTheme === 'light' ? '#333333' : '#ffffff';
      pegs.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, PEG_RADIUS, 0, Math.PI * 2);
        ctx.fill();
      });

      const slotWidth = canvas.width / MULTIPLIERS.length;
      MULTIPLIERS.forEach((m, i) => {
        const x = i * slotWidth;
        const y = canvas.height - 40;
        ctx.fillStyle = COLORS[i];
        ctx.fillRect(x + 2, y, slotWidth - 4, 38);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`x${m}`, x + slotWidth / 2, y + 24);
      });

      ctx.save();
      ctx.fillStyle = '#fffb00';
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#fffb00';
      balls.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, BALL_RADIUS, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.restore();
    };

    const loop = () => {
      update();
      draw();
      requestAnimationFrame(loop);
    };

    // 4. ОБРАБОТЧИКИ СОБЫТИЙ
    themeDarkBtn.addEventListener('click', () => applyTheme('dark'));
    themeLightBtn.addEventListener('click', () => applyTheme('light'));

    menuT
