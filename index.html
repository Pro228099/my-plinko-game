<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Plinko Mini App</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      background-color: #121820;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 12px;
    }

    .header {
      width: 100%;
      max-width: 360px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 8px 12px;
      background: #1c2733;
      border-radius: 12px;
    }

    .score-container {
      font-size: 16px;
      font-weight: bold;
    }

    .score-value {
      color: #4caf50;
      transition: color 0.2s;
    }

    .version-tag {
      font-size: 11px;
      color: #708499;
      font-family: monospace;
    }

    .canvas-container {
      width: 100%;
      max-width: 360px;
      display: flex;
      justify-content: center;
    }

    canvas {
      width: 100%;
      height: auto;
      aspect-ratio: 360 / 520;
      background: #18222d;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      touch-action: none;
    }

    .controls {
      width: 100%;
      max-width: 360px;
      margin-top: 12px;
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      background: #2ea6ff;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active {
      transform: scale(0.97);
      opacity: 0.9;
    }

    .btn-reset {
      background: #e53935;
      flex: 0.4;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #708499;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="score-container">Счёт: <span id="score" class="score-value">100</span></div>
    <div class="version-tag">v2.1.0</div>
  </div>

  <div class="canvas-container">
    <canvas id="gameCanvas" width="360" height="520"></canvas>
  </div>

  <div class="controls">
    <button id="drop-btn" class="btn">Бросить шарик (-10)</button>
    <button id="reset-btn" class="btn btn-reset">Сброс</button>
  </div>

  <div class="hint">Нажми на поле или кнопку, чтобы запустить шар</div>

  <script>
    // Инициализация Canvas
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    // Состояние игры и плавного счета
    let score = parseInt(localStorage.getItem('plinko_v2_score') || '100', 10);
    let displayedScore = score;
    scoreEl.innerText = Math.round(displayedScore);

    // Константы
    const ROWS = 7;
    const PEG_RADIUS = 4;
    const BALL_RADIUS = 7;
    const GRAVITY = 0.25;
    const RESTITUTION = 0.5;

    const MULTIPLIERS = [0, 2, 3, 5, 3, 2, 0];
    const COLORS = ['#546e7a', '#ff9800', '#f44336', '#e91e63', '#f44336', '#ff9800', '#546e7a'];

    // Генерация колышков
    const pegs = [];
    const startY = 80;
    const rowSpacing = 45;
    const colSpacing = 38;

    for (let r = 0; r < ROWS; r++) {
      const count = r + 3;
      const startX = (canvas.width - (count - 1) * colSpacing) / 2;
      for (let c = 0; c < count; c++) {
        pegs.push({ x: startX + c * colSpacing, y: startY + r * rowSpacing });
      }
    }

    // Динамические массивы
    const balls = [];
    const popups = [];

    // Обновление реального счета
    function updateScore(delta) {
      score += delta;
      localStorage.setItem('plinko_v2_score', score.toString());
    }

    // Добавление всплывающего текста очков
    function addPopup(x, y, points, color) {
      popups.push({
        x: x,
        y: y,
        text: '+' + points,
        color: color,
        alpha: 1.0,
        scale: 1.2
      });
    }

    // Спавн шарика
    function spawnBall(customX) {
      if (score < 10) {
        alert("Недостаточно очков! Нажмите 'Сброс'.");
        return;
      }
      updateScore(-10);

      const spawnX = customX !== undefined 
        ? Math.max(BALL_RADIUS + 5, Math.min(canvas.width - BALL_RADIUS - 5, customX))
        : canvas.width / 2 + (Math.random() - 0.5) * 10;

      balls.push({
        x: spawnX,
        y: 20,
        vx: (Math.random() - 0.5) * 1.5,
        vy: 0
      });
    }

    // Расчет индекса слота
    function getSlotIndex(x) {
      const slotWidth = canvas.width / MULTIPLIERS.length;
      const idx = Math.floor(x / slotWidth);
      return Math.max(0, Math.min(MULTIPLIERS.length - 1, idx));
    }

    // Обновление физики и анимаций
    function update() {
      // 1. Плавный анимационный счетчик
      if (Math.abs(displayedScore - score) > 0.1) {
        displayedScore += (score - displayedScore) * 0.12;
        scoreEl.innerText = Math.round(displayedScore);
      } else if (displayedScore !== score) {
        displayedScore = score;
        scoreEl.innerText = score;
      }

      // 2. Анимация всплывающих текстов очков
      for (let i = popups.length - 1; i >= 0; i--) {
        const p = popups[i];
        p.y -= 1.2;
        p.alpha -= 0.025;
        if (p.scale > 1.0) p.scale -= 0.015;

        if (p.alpha <= 0) {
          popups.splice(i, 1);
        }
      }

      // 3. Физика шариков
      for (let i = balls.length - 1; i >= 0; i--) {
        const b = balls[i];
        b.vy += GRAVITY;
        b.x += b.vx;
        b.y += b.vy;

        // Отскоки от стенок
        if (b.x - BALL_RADIUS < 0) {
          b.x = BALL_RADIUS;
          b.vx *= -RESTITUTION;
        }
        if (b.x + BALL_RADIUS > canvas.width) {
          b.x = canvas.width - BALL_RADIUS;
          b.vx *= -RESTITUTION;
        }

        // Столкновение с колышками
        for (let j = 0; j < pegs.length; j++) {
          const p = pegs[j];
          const dx = b.x - p.x;
          const dy = b.y - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const minDist = BALL_RADIUS + PEG_RADIUS;

          if (dist < minDist) {
            const angle = Math.atan2(dy, dx);
            const overlap = minDist - dist;
            b.x += Math.cos(angle) * overlap;
            b.y += Math.sin(angle) * overlap;

            const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy) * RESTITUTION;
            b.vx = Math.cos(angle) * speed + (Math.random() - 0.5) * 0.6;
            b.vy = Math.sin(angle) * speed;
          }
        }

        // Попадание в нижнюю лузу
        if (b.y + BALL_RADIUS >= canvas.height - 40) {
          const slotIdx = getSlotIndex(b.x);
          const mult = MULTIPLIERS[slotIdx];
          const gained = 10 * mult;

          updateScore(gained);

          // Спавним анимацию очков
          const slotWidth = canvas.width / MULTIPLIERS.length;
          const popupX = (slotIdx + 0.5) * slotWidth;
          const popupY = canvas.height - 45;

          addPopup(popupX, popupY, gained, COLORS[slotIdx]);

          balls.splice(i, 1);
        }
      }
    }

    // Отрисовка кадров
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 1. Отрисовка колышков
      ctx.fillStyle = '#ffffff';
      for (let i = 0; i < pegs.length; i++) {
        const p = pegs[i];
        ctx.beginPath();
        ctx.arc(p.x, p.y, PEG_RADIUS, 0, Math.PI * 2);
        ctx.fill();
      }

      // 2. Отрисовка мультипликаторов снизу
      const slotWidth = canvas.width / MULTIPLIERS.length;
      for (let k = 0; k < MULTIPLIERS.length; k++) {
        const m = MULTIPLIERS[k];
        const x = k * slotWidth;
        const y = canvas.height - 40;

        ctx.fillStyle = COLORS[k];
        ctx.fillRect(x + 2, y, slotWidth - 4, 38);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('x' + m, x + slotWidth / 2, y + 24);
      }

      // 3. Отрисовка шариков
      ctx.fillStyle = '#ffeb3b';
      for (let i = 0; i < balls.length; i++) {
        const b = balls[i];
        ctx.beginPath();
        ctx.arc(b.x, b.y, BALL_RADIUS, 0, Math.PI * 2);
        ctx.fill();
      }

      // 4. Отрисовка анимаций всплывающих очков
      for (let i = 0; i < popups.length; i++) {
        const p = popups[i];
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.fillStyle = p.color;
        ctx.font = `bold ${Math.round(18 * p.scale)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.shadowBlur = 6;
        ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.fillText(p.text, p.x, p.y);
        ctx.restore();
      }
    }

    // Основной игровой цикл
    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Слушатели событий
    canvas.addEventListener('pointerdown', (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const clickX = (e.clientX - rect.left) * scaleX;
      spawnBall(clickX);
    });

    document.getElementById('drop-btn').addEventListener('click', () => spawnBall());
    
    document.getElementById('reset-btn').addEventListener('click', () => {
      score = 100;
      localStorage.setItem('plinko_v2_score', '100');
    });

    // Запуск цикла
    gameLoop();
  </script>
</body>
</html>
