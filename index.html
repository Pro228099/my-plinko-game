<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Plinko Mini App</title>
  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      background-color: #121820;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 10px;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* === РАДУЖНАЯ НЕОНОВАЯ АНИМАЦИЯ === */
    @keyframes rainbowGlow {
      0% {
        border-color: #ff0055;
        box-shadow: 0 0 10px #ff0055, inset 0 0 5px #ff0055;
      }
      25% {
        border-color: #00e5ff;
        box-shadow: 0 0 10px #00e5ff, inset 0 0 5px #00e5ff;
      }
      50% {
        border-color: #00ff66;
        box-shadow: 0 0 10px #00ff66, inset 0 0 5px #00ff66;
      }
      75% {
        border-color: #ffb700;
        box-shadow: 0 0 10px #ffb700, inset 0 0 5px #ffb700;
      }
      100% {
        border-color: #ff0055;
        box-shadow: 0 0 10px #ff0055, inset 0 0 5px #ff0055;
      }
    }

    /* === ШАПКА === */
    .header {
      width: 100%;
      max-width: 360px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      padding: 8px 12px;
      background: #1c2733;
      border-radius: 12px;
      transition: background 0.3s ease;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* НЕОНОВАЯ КНОПКА */
    .icon-btn-neon {
      background: rgba(0, 0, 0, 0.2);
      border: 2px solid #ff0055;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      animation: rainbowGlow 4s linear infinite;
      transition: transform 0.2s ease;
    }
    .icon-btn-neon:active { transform: scale(0.88) rotate(15deg); }

    /* БЛОК ЦЕНТРА ШАПКИ */
    .header-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .menu-btn-text {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      padding: 3px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .menu-btn-text:active {
      transform: scale(0.93);
      background: rgba(255, 255, 255, 0.18);
    }

    .score-container {
      font-size: 15px;
      font-weight: bold;
    }

    .score-value {
      color: #4caf50;
      transition: color 0.2s;
    }

    .version-tag {
      font-size: 12px;
      font-weight: 700;
      color: #708499;
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .author-tag {
      font-size: 9px;
      font-weight: 500;
      color: #546e7a;
      margin-top: 1px;
    }

    /* === ВСПЛЫВАЮЩАЯ ПЛАШКА === */
    .banner-error {
      width: 100%;
      max-width: 360px;
      background: rgba(229, 57, 53, 0.95);
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      padding: 10px 14px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(229, 57, 53, 0.4);
      
      opacity: 0;
      transform: translateY(-10px);
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-bottom: 0;
      overflow: hidden;
      pointer-events: none;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .banner-error.show {
      opacity: 1;
      transform: translateY(0);
      max-height: 50px;
      padding-top: 10px;
      padding-bottom: 10px;
      margin-bottom: 8px;
    }

    /* === CANVAS === */
    .canvas-container {
      width: 100%;
      max-width: 360px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    canvas {
      width: 100%;
      height: auto;
      aspect-ratio: 360 / 580;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      touch-action: none;
      background: #18222d;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      background: #2ea6ff;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active {
      transform: scale(0.97);
      opacity: 0.9;
    }
    .btn-danger { background: #e53935; }
    .btn-secondary { background: #546e7a; }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #708499;
      text-align: center;
    }

    /* === МОДАЛЬНЫЕ ОКНА === */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .modal-box {
      position: relative;
      background: #1c2733;
      padding: 20px 16px;
      border-radius: 18px;
      width: 90%;
      max-width: 320px;
      border: 2px solid #ff0055;
      animation: rainbowGlow 6s linear infinite;
      text-align: center;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 14px;
      background: none;
      border: none;
      font-size: 22px;
      color: #708499;
      cursor: pointer;
    }

    .modal-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    /* ПОДВКЛАДКИ (ТАБЫ) В СКИНАХ */
    .tabs-nav {
      display: flex;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 14px;
      gap: 4px;
    }

    .tab-btn {
      flex: 1;
      padding: 6px 0;
      font-size: 13px;
      font-weight: 600;
      border: none;
      background: transparent;
      color: #708499;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
    }

    .tab-content {
      display: none;
      overflow-y: auto;
      max-height: 320px;
      padding-right: 2px;
    }

    .tab-content.active {
      display: block;
    }

    /* === СЕТКА ВЫБОРА СКИНОВ ШАРИКОВ (3 В РЯД) === */
    .skins-grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 5px;
    }

    .skin-slot {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      height: 70px;
    }

    .skin-item {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      box-shadow: inset 0 -3px 6px rgba(0,0,0,0.5), inset 0 3px 6px rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .skin-item:active { transform: scale(0.9); }
    .skin-item.selected {
      border-color: #ffffff;
      transform: scale(1.08);
      box-shadow: 0 0 10px rgba(255,255,255,0.8);
    }

    .brush-btn {
      position: absolute;
      right: 4px;
      bottom: 4px;
      width: 18px;
      height: 18px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.4);
      transition: transform 0.2s;
    }
    .brush-btn:active { transform: scale(0.85); }

    #color-picker {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    /* === СЕТКА ВЫБОРА ФОНОВ (2 В РЯД) === */
    .bg-grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .bg-card {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      height: 110px;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .bg-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .bg-card.selected {
      border-color: #00e5ff;
      box-shadow: 0 0 12px rgba(0, 229, 255, 0.6);
      transform: scale(1.02);
    }

    .bg-card-default {
      background: #18222d;
      font-size: 12px;
      font-weight: bold;
      color: #708499;
    }

    .bg-card-badge {
      position: absolute;
      bottom: 6px;
      background: rgba(0, 0, 0, 0.75);
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
      color: #4caf50;
      backdrop-filter: blur(2px);
    }

    .bg-card-badge.price {
      color: #ffb700;
    }

    .danger-zone {
      margin-top: 10px;
      padding: 12px;
      background: rgba(229, 57, 53, 0.1);
      border: 1px solid rgba(229, 57, 53, 0.4);
      border-radius: 12px;
      text-align: left;
    }

    .danger-title {
      font-size: 12px;
      font-weight: bold;
      color: #ef5350;
      margin-bottom: 8px;
    }

    .modal-buttons-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <!-- ШАПКА ИГРЫ -->
  <div class="header">
    <div class="header-left">
      <button id="settings-btn" class="icon-btn-neon" title="Настройки">⚙️</button>
      <button id="skins-btn" class="icon-btn-neon" title="Скины">🎨</button>
    </div>
    
    <div class="header-center">
      <button id="menu-btn" class="menu-btn-text">Меню</button>
      <div class="score-container"><span id="score" class="score-value">100$</span></div>
    </div>

    <div class="version-tag">
      v1.3.1
      <span class="author-tag">by @pro228099</span>
    </div>
  </div>

  <!-- ВСПЛЫВАЮЩАЯ ПЛАШКА ОШИБКИ -->
  <div id="no-score-banner" class="banner-error">
    Недостаточно средств!
  </div>

  <!-- ИГРОВОЕ ПОЛЕ -->
  <div class="canvas-container">
    <canvas id="gameCanvas" width="360" height="580"></canvas>
    <div class="hint">Нажмите на поле, чтобы запустить шар (-10$)</div>
  </div>

  <!-- Модальное окно "Внешний вид" (Скины / Фоны) -->
  <div id="skins-modal" class="modal-overlay">
    <div class="modal-box">
      <button id="close-skins" class="close-btn">&times;</button>
      <div class="modal-title">🎨 Внешний вид</div>
      
      <!-- Подвкладки -->
      <div class="tabs-nav">
        <button id="tab-btn-balls" class="tab-btn active">Скины</button>
        <button id="tab-btn-bg" class="tab-btn">Фоны</button>
      </div>

      <!-- Вкладка 1: Шарики -->
      <div id="tab-balls" class="tab-content active">
        <div class="skins-grid-3">
          <div class="skin-slot">
            <div id="normal-ball-skin" class="skin-item"></div>
            <div id="brush-trigger" class="brush-btn" title="Изменить цвет">✏️</div>
            <input type="color" id="color-picker" value="#ff0000">
          </div>

          <div class="skin-slot">
            <div id="soccer-ball-skin" class="skin-item" style="background: #ffffff; box-shadow: none;">⚽</div>
          </div>

          <div class="skin-slot"></div>
        </div>
      </div>

      <!-- Вкладка 2: Фоны -->
      <div id="tab-bg" class="tab-content">
        <div id="bg-grid" class="bg-grid-2">
          <!-- Сюда динамически добавятся фоны -->
        </div>
      </div>
    </div>
  </div>

  <!-- Модальное окно "Меню" (Coming Soon) -->
  <div id="menu-modal" class="modal-overlay">
    <div class="modal-box" style="border: 1px solid rgba(255,255,255,0.1); animation: none;">
      <button id="close-menu" class="close-btn">&times;</button>
      <div class="modal-title">☰ Меню</div>
      <div id="coming-soon-text" style="font-size: 15px; color: #708499; margin: 25px 0; user-select: none;">Coming soon...</div>
    </div>
  </div>

  <!-- Модальное окно настроек -->
  <div id="settings-modal" class="modal-overlay">
    <div class="modal-box">
      <button id="close-settings" class="close-btn">&times;</button>
      
      <div class="modal-title">⚙️ Настройки</div>

      <div class="danger-zone">
        <div class="danger-title">❗ Опасная зона</div>
        <button id="open-confirm-btn" class="btn btn-danger" style="padding: 9px; font-size: 13px;">Сбросить счёт</button>
      </div>
    </div>
  </div>

  <!-- Подтверждение сброса -->
  <div id="confirm-modal" class="modal-overlay">
    <div class="modal-box" style="border: 1px solid rgba(255,255,255,0.1); animation: none;">
      <div style="font-size: 15px; margin-bottom: 15px;">Точно сбросить счёт до 100$?</div>
      <div class="modal-buttons-row">
        <button id="confirm-yes" class="btn btn-danger" style="padding: 10px;">Да</button>
        <button id="confirm-no" class="btn btn-secondary" style="padding: 10px;">Отмена</button>
      </div>
    </div>
  </div>

  <script>
    // Инициализация Telegram WebApp API
    const tg = window.Telegram ? window.Telegram.WebApp : null;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    // Canvas & UI
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const noScoreBanner = document.getElementById('no-score-banner');

    const settingsBtn = document.getElementById('settings-btn');
    const settingsModal = document.getElementById('settings-modal');
    const closeSettings = document.getElementById('close-settings');

    const skinsBtn = document.getElementById('skins-btn');
    const skinsModal = document.getElementById('skins-modal');
    const closeSkins = document.getElementById('close-skins');

    const tabBtnBalls = document.getElementById('tab-btn-balls');
    const tabBtnBg = document.getElementById('tab-btn-bg');
    const tabBalls = document.getElementById('tab-balls');
    const tabBg = document.getElementById('tab-bg');
    const bgGrid = document.getElementById('bg-grid');

    const normalBallSkin = document.getElementById('normal-ball-skin');
    const soccerBallSkin = document.getElementById('soccer-ball-skin');
    const brushTrigger = document.getElementById('brush-trigger');
    const colorPicker = document.getElementById('color-picker');

    const menuBtn = document.getElementById('menu-btn');
    const menuModal = document.getElementById('menu-modal');
    const closeMenu = document.getElementById('close-menu');

    const openConfirmBtn = document.getElementById('open-confirm-btn');
    const confirmModal = document.getElementById('confirm-modal');
    const confirmYes = document.getElementById('confirm-yes');
    const confirmNo = document.getElementById('confirm-no');

    // Состояние игры
    let score = parseInt(localStorage.getItem('plinko_v2_score') || '100', 10);
    let selectedBallColor = localStorage.getItem('plinko_ball_color') || '#ff0000';
    let activeSkinType = localStorage.getItem('plinko_skin_type') || 'normal';
    let activeBgName = localStorage.getItem('plinko_bg_name') || 'default';
    
    // Купленные фоны (дефолтный всегда куплен)
    let unlockedBgs = JSON.parse(localStorage.getItem('plinko_unlocked_bgs') || '["default"]');

    // Базовый список и кэш
    let bgList = ['default'];
    const bgImagesCache = {};

    // Загрузка динамического списка из manifest.json (авто-хук)
    async function loadBgManifest() {
      try {
        const res = await fetch('assets/manifest.json');
        if (res.ok) {
          const files = await res.json();
          const dynamicBgs = files
            .filter(f => f.endsWith('.jpg') || f.endsWith('.png'))
            .map(f => f.replace(/\.(jpg|png)$/, ''));
          
          bgList = ['default', ...dynamicBgs];
        }
      } catch (e) {
        console.log('Ошибочка при загрузке манифеста, используем встроенные', e);
      }

      // Кэширование картинок
      bgList.forEach(name => {
        if (name !== 'default') {
          const img = new Image();
          img.src = `assets/${name}.jpg`;
          bgImagesCache[name] = img;
        }
      });

      renderBgGrid();
    }

    let displayedScore = score;
    let bannerTimeout = null;
    let lastSpawnTime = 0;

    scoreEl.innerText = Math.round(displayedScore) + '$';
    colorPicker.value = selectedBallColor;

    // Переключение подвкладок
    tabBtnBalls.addEventListener('click', () => {
      tabBtnBalls.classList.add('active');
      tabBtnBg.classList.remove('active');
      tabBalls.classList.add('active');
      tabBg.classList.remove('active');
    });

    tabBtnBg.addEventListener('click', () => {
      tabBtnBg.classList.add('active');
      tabBtnBalls.classList.remove('active');
      tabBg.classList.add('active');
      tabBalls.classList.remove('active');
    });

    // Отрисовка сетки фонов с учётом покупки по 1000$
    function renderBgGrid() {
      bgGrid.innerHTML = '';
      bgList.forEach(name => {
        const card = document.createElement('div');
        card.className = `bg-card ${activeBgName === name ? 'selected' : ''}`;
        
        const isUnlocked = unlockedBgs.includes(name);

        if (name === 'default') {
          card.classList.add('bg-card-default');
          card.innerText = 'По умолчанию';
        } else {
          const img = document.createElement('img');
          img.src = `assets/${name}.jpg`;
          img.alt = `Фон ${name}`;
          card.appendChild(img);

          const badge = document.createElement('div');
          badge.className = `bg-card-badge ${isUnlocked ? '' : 'price'}`;
          badge.innerText = isUnlocked ? 'Куплено' : '1000$';
          card.appendChild(badge);
        }

        card.addEventListener('click', () => {
          if (isUnlocked) {
            activeBgName = name;
            localStorage.setItem('plinko_bg_name', name);
            renderBgGrid();
          } else {
            // Покупка фона
            if (score >= 1000) {
              updateScore(-1000);
              unlockedBgs.push(name);
              localStorage.setItem('plinko_unlocked_bgs', JSON.stringify(unlockedBgs));
              activeBgName = name;
              localStorage.setItem('plinko_bg_name', name);
              renderBgGrid();
            } else {
              showNoScoreBanner('Недостаточно денег (Нужно 1000$)');
            }
          }
        });

        bgGrid.appendChild(card);
      });
    }

    // Обновление отображения выбранного скина
    function updateSkinsUI() {
      normalBallSkin.style.backgroundColor = selectedBallColor;

      if (activeSkinType === 'normal') {
        normalBallSkin.classList.add('selected');
        soccerBallSkin.classList.remove('selected');
      } else {
        soccerBallSkin.classList.add('selected');
        normalBallSkin.classList.remove('selected');
      }

      renderBgGrid();
    }

    // Выбор скинов шариков
    normalBallSkin.addEventListener('click', () => {
      activeSkinType = 'normal';
      localStorage.setItem('plinko_skin_type', 'normal');
      updateSkinsUI();
    });

    soccerBallSkin.addEventListener('click', () => {
      activeSkinType = 'soccer';
      localStorage.setItem('plinko_skin_type', 'soccer');
      updateSkinsUI();
    });

    brushTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      colorPicker.click();
    });

    colorPicker.addEventListener('input', (e) => {
      selectedBallColor = e.target.value;
      localStorage.setItem('plinko_ball_color', selectedBallColor);
      activeSkinType = 'normal';
      localStorage.setItem('plinko_skin_type', 'normal');
      updateSkinsUI();
    });

    // РАЗМЕРЫ И ФИЗИКА
    const ROWS = 7;
    const PEG_RADIUS = 5;
    const BALL_RADIUS = 10;
    const GRAVITY = 0.25;
    const RESTITUTION = 0.48;

    const MULTIPLIERS = [0, 1, 2, 3, 2, 1, 0];
    const COLORS = ['#546e7a', '#2ea6ff', '#ff9800', '#e91e63', '#ff9800', '#2ea6ff', '#546e7a'];

    // Генерация колышков
    const pegs = [];
    const startY = 95;
    const rowSpacing = 68;
    const colSpacing = 38;

    for (let r = 0; r < ROWS; r++) {
      const count = r + 3;
      const startX = (canvas.width - (count - 1) * colSpacing) / 2;
      for (let c = 0; c < count; c++) {
        pegs.push({ x: startX + c * colSpacing, y: startY + r * rowSpacing });
      }
    }

    const balls = [];
    const popups = [];

    // Обновление счета
    function updateScore(delta) {
      score += delta;
      localStorage.setItem('plinko_v2_score', score.toString());
    }

    // Показ плашки ошибки
    function showNoScoreBanner(msg) {
      noScoreBanner.innerText = msg || 'У вас нет счёта, сбросьте в настройках';
      noScoreBanner.classList.add('show');
      if (bannerTimeout) clearTimeout(bannerTimeout);
      bannerTimeout = setTimeout(() => {
        noScoreBanner.classList.remove('show');
      }, 2500);
    }

    // Всплывающие очки
    function addPopup(x, y, points, color) {
      popups.push({
        x: x,
        y: y,
        text: '+' + points + '$',
        color: color,
        alpha: 1.0,
        scale: 1.2
      });
    }

    // Спавн шарика
    function spawnBall(customX) {
      const now = Date.now();
      if (now - lastSpawnTime < 100) return;

      if (score < 10) {
        showNoScoreBanner('У вас нет счёта, сбросьте в настройках');
        return;
      }

      lastSpawnTime = now;
      updateScore(-10);

      const spawnX = customX !== undefined 
        ? Math.max(BALL_RADIUS + 5, Math.min(canvas.width - BALL_RADIUS - 5, customX))
        : canvas.width / 2 + (Math.random() - 0.5) * 10;

      balls.push({
        x: spawnX,
        y: 20,
        vx: (Math.random() - 0.5) * 1.5,
        vy: 0,
        color: selectedBallColor,
        type: activeSkinType,
        angle: 0
      });
    }

    function getSlotIndex(x) {
      const slotWidth = canvas.width / MULTIPLIERS.length;
      const idx = Math.floor(x / slotWidth);
      return Math.max(0, Math.min(MULTIPLIERS.length - 1, idx));
    }

    // Обновление физики
    function update() {
      if (Math.abs(displayedScore - score) > 0.1) {
        displayedScore += (score - displayedScore) * 0.12;
        scoreEl.innerText = Math.round(displayedScore) + '$';
      } else if (displayedScore !== score) {
        displayedScore = score;
        scoreEl.innerText = score + '$';
      }

      for (let i = popups.length - 1; i >= 0; i--) {
        const p = popups[i];
        p.y -= 1.2;
        p.alpha -= 0.025;
        if (p.scale > 1.0) p.scale -= 0.015;

        if (p.alpha <= 0) popups.splice(i, 1);
      }

      // Обновление позиций шаров и коллизии
      for (let i = balls.length - 1; i >= 0; i--) {
        const b = balls[i];
        b.vy += GRAVITY;
        b.x += b.vx;
        b.y += b.vy;
        b.angle += b.vx * 0.1;

        // Стенки
        if (b.x - BALL_RADIUS < 0) { b.x = BALL_RADIUS; b.vx *= -RESTITUTION; }
        if (b.x + BALL_RADIUS > canvas.width) { b.x = canvas.width - BALL_RADIUS; b.vx *= -RESTITUTION; }

        // Колышки
        for (let j = 0; j < pegs.length; j++) {
          const p = pegs[j];
          const dx = b.x - p.x;
          const dy = b.y - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const minDist = BALL_RADIUS + PEG_RADIUS;

          if (dist < minDist) {
            const angle = Math.atan2(dy, dx);
            const overlap = minDist - dist;
            b.x += Math.cos(angle) * overlap;
            b.y += Math.sin(angle) * overlap;

            const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy) * RESTITUTION;
            b.vx = Math.cos(angle) * speed + (Math.random() - 0.5) * 0.6;
            b.vy = Math.sin(angle) * speed;
          }
        }
      }

      // Коллизии между шариками
      for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
          const b1 = balls[i];
          const b2 = balls[j];

          const dx = b2.x - b1.x;
          const dy = b2.y - b1.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const minDist = BALL_RADIUS * 2;

          if (dist < minDist && dist > 0) {
            const angle = Math.atan2(dy, dx);
            const overlap = (minDist - dist) / 2;

            b1.x -= Math.cos(angle) * overlap;
            b1.y -= Math.sin(angle) * overlap;
            b2.x += Math.cos(angle) * overlap;
            b2.y += Math.sin(angle) * overlap;

            const nx = dx / dist;
            const ny = dy / dist;
            const kx = b1.vx - b2.vx;
            const ky = b1.vy - b2.vy;
            const p = 2 * (nx * kx + ny * ky) / 2;

            b1.vx -= p * nx * RESTITUTION;
            b1.vy -= p * ny * RESTITUTION;
            b2.vx += p * nx * RESTITUTION;
            b2.vy += p * ny * RESTITUTION;
          }
        }
      }

      // Попадание в ячейки
      for (let i = balls.length - 1; i >= 0; i--) {
        const b = balls[i];
        if (b.y + BALL_RADIUS >= canvas.height - 40) {
          const slotIdx = getSlotIndex(b.x);
          const mult = MULTIPLIERS[slotIdx];
          const gained = 10 * mult;

          updateScore(gained);

          const slotWidth = canvas.width / MULTIPLIERS.length;
          const popupX = (slotIdx + 0.5) * slotWidth;
          const popupY = canvas.height - 45;

          addPopup(popupX, popupY, gained, COLORS[slotIdx]);
          balls.splice(i, 1);
        }
      }
    }

    // Отрисовка футбольного мяча
    function drawSoccerBall(b) {
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(b.angle);

      ctx.beginPath();
      ctx.arc(0, 0, BALL_RADIUS, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();

      ctx.fillStyle = '#111111';
      ctx.beginPath();
      ctx.arc(0, 0, BALL_RADIUS * 0.35, 0, Math.PI * 2);
      ctx.fill();

      for (let a = 0; a < 5; a++) {
        const ang = (a * Math.PI * 2) / 5;
        const px = Math.cos(ang) * BALL_RADIUS * 0.75;
        const py = Math.sin(ang) * BALL_RADIUS * 0.75;
        ctx.beginPath();
        ctx.arc(px, py, BALL_RADIUS * 0.22, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    // Отрисовка
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Отрисовка фонового изображения (если выбран фон)
      if (activeBgName !== 'default' && bgImagesCache[activeBgName] && bgImagesCache[activeBgName].complete) {
        ctx.drawImage(bgImagesCache[activeBgName], 0, 0, canvas.width, canvas.height);
      }

      // Отрисовка колышков
      ctx.fillStyle = '#ffffff';
      for (let i = 0; i < pegs.length; i++) {
        const p = pegs[i];
        ctx.beginPath();
        ctx.arc(p.x, p.y, PEG_RADIUS, 0, Math.PI * 2);
        ctx.fill();
      }

      // Ячейки мультипликаторов
      const slotWidth = canvas.width / MULTIPLIERS.length;
      for (let k = 0; k < MULTIPLIERS.length; k++) {
        const m = MULTIPLIERS[k];
        const x = k * slotWidth;
        const y = canvas.height - 40;

        ctx.fillStyle = COLORS[k];
        ctx.fillRect(x + 2, y, slotWidth - 4, 38);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('x' + m, x + slotWidth / 2, y + 24);
      }

      // Отрисовка шариков
      for (let i = 0; i < balls.length; i++) {
        const b = balls[i];

        // Тень
        ctx.save();
        ctx.beginPath();
        ctx.arc(b.x + 2, b.y + 3, BALL_RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
        ctx.fill();
        ctx.restore();

        if (b.type === 'soccer') {
          drawSoccerBall(b);
        } else {
          ctx.save();
          ctx.beginPath();
          ctx.arc(b.x, b.y, BALL_RADIUS, 0, Math.PI * 2);

          const grad = ctx.createRadialGradient(
            b.x - BALL_RADIUS * 0.25,
            b.y - BALL_RADIUS * 0.25,
            BALL_RADIUS * 0.05,
            b.x,
            b.y,
            BALL_RADIUS
          );

          grad.addColorStop(0, b.color);
          grad.addColorStop(0.7, b.color);
          grad.addColorStop(1, '#000000');

          ctx.fillStyle = grad;
          ctx.fill();

          ctx.beginPath();
          ctx.ellipse(
            b.x - BALL_RADIUS * 0.3,
            b.y - BALL_RADIUS * 0.32,
            BALL_RADIUS * 0.38,
            BALL_RADIUS * 0.26,
            -Math.PI / 4,
            0,
            Math.PI * 2
          );
          ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
          ctx.fill();

          ctx.restore();
        }
      }

      // Всплывающие очки
      for (let i = 0; i < popups.length; i++) {
        const p = popups[i];
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.fillStyle = p.color;
        ctx.font = `bold ${Math.round(18 * p.scale)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.shadowBlur = 6;
        ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.fillText(p.text, p.x, p.y);
        ctx.restore();
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // События
    canvas.addEventListener('pointerdown', (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const clickX = (e.clientX - rect.left) * scaleX;
      spawnBall(clickX);
    });

    // Окна
    settingsBtn.addEventListener('click', () => settingsModal.style.display = 'flex');
    closeSettings.addEventListener('click', () => settingsModal.style.display = 'none');

    skinsBtn.addEventListener('click', () => {
      updateSkinsUI();
      skinsModal.style.display = 'flex';
    });
    closeSkins.addEventListener('click', () => skinsModal.style.display = 'none');

    menuBtn.addEventListener('click', () => menuModal.style.display = 'flex');
    closeMenu.addEventListener('click', () => menuModal.style.display = 'none');

    openConfirmBtn.addEventListener('click', () => confirmModal.style.display = 'flex');
    confirmNo.addEventListener('click', () => confirmModal.style.display = 'none');
    confirmYes.addEventListener('click', () => {
      score = 100;
      localStorage.setItem('plinko_v2_score', '100');
      confirmModal.style.display = 'none';
      settingsModal.style.display = 'none';
    });

    // Запуск
    loadBgManifest();
    updateSkinsUI();
    gameLoop();
  </script>
</body>
</html>
