<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Plinko Game</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #18222d;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* === СВЕТЛАЯ ТЕМА === */
    body.light-theme {
      background: #eef2f5;
      color: #111;
    }
    body.light-theme #score-board { color: #111; }
    body.light-theme canvas {
      background: #ffffff;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }
    body.light-theme .hint { color: #657786; }
    body.light-theme .modal-box {
      background: #ffffff;
      color: #111;
    }
    body.light-theme .modal-text { color: #111; }

    /* === ВЕРХНЯЯ ПАНЕЛЬ И ВЛАДКА МЕНЮ === */
    .settings-btn {
      position: absolute;
      top: 8px;
      left: 12px;
      font-size: 20px;
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0.75;
      transition: transform 0.3s ease, opacity 0.2s ease;
      z-index: 100;
      user-select: none;
    }
    .settings-btn:active {
      transform: rotate(90deg) scale(0.9);
      opacity: 1;
    }

    .menu-tab-btn {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #fff;
      padding: 4px 16px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      z-index: 100;
      user-select: none;
      backdrop-filter: blur(4px);
    }
    .menu-tab-btn:active {
      transform: translateX(-50%) scale(0.94);
      background: rgba(255, 255, 255, 0.25);
    }
    body.light-theme .menu-tab-btn {
      background: rgba(0, 0, 0, 0.08);
      border-color: rgba(0, 0, 0, 0.15);
      color: #111;
    }

    .app-version {
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
      font-family: monospace;
      pointer-events: none;
      user-select: none;
    }
    body.light-theme .app-version {
      color: rgba(0, 0, 0, 0.35);
    }

    #score-board {
      font-size: 20px;
      margin-bottom: 10px;
      font-weight: bold;
      transition: transform 0.1s ease;
      display: inline-block;
    }
    canvas {
      background: #10171e;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      touch-action: none;
      transition: background 0.3s ease;
    }
    .hint {
      margin-top: 10px;
      font-size: 14px;
      color: #8e9ca8;
    }

    /* === МОДАЛЬНЫЕ ОКНА === */
    .modal-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(4px);
    }

    .modal-box {
      position: relative;
      background: #242f3d;
      padding: 24px 20px;
      border-radius: 16px;
      text-align: center;
      max-width: 290px;
      width: 88%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* === ЧЁРНОЕ ОКНО НАСТРОЕК С РАДУЖНОЙ НЕОНОВОЙ РАМКОЙ === */
    .rainbow-modal {
      position: relative;
      background: #000000 !important;
      color: #ffffff !important;
      padding: 24px 20px;
      border-radius: 16px;
      text-align: center;
      max-width: 310px;
      width: 88%;
      box-shadow: 0 0 35px rgba(0, 0, 0, 0.95);
      z-index: 1;
    }
    .rainbow-modal::before {
      content: '';
      position: absolute;
      top: -3px; left: -3px; right: -3px; bottom: -3px;
      background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #00ff00, #00afff, #7a00ff, #ff00c8, #ff0000);
      border-radius: 19px;
      z-index: -1;
      background-size: 400%;
      animation: rainbowGlow 8s linear infinite;
    }

    @keyframes rainbowGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 14px;
      background: none;
      border: none;
      font-size: 22px;
      color: #8e9ca8;
      cursor: pointer;
      line-height: 1;
    }

    .modal-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #ffffff;
    }

    /* === ЭЛЕМЕНТЫ НАСТРОЕК === */
    .setting-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #ffffff;
    }

    .theme-toggle {
      display: flex;
      width: 100%;
      background: #111111;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 3px;
      gap: 4px;
    }

    .theme-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      color: #8e9ca8;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .theme-btn.active {
      background: #2ea6ff;
      color: #fff;
      font-weight: bold;
    }

    /* === КРАСНАЯ ОПАСНАЯ ЗОНА === */
    .danger-zone {
      margin-top: 15px;
      padding: 12px;
      background: rgba(244, 67, 54, 0.12);
      border: 1px solid #f44336;
      border-radius: 12px;
      text-align: left;
    }
    .danger-header {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: bold;
      color: #ff5252;
      margin-bottom: 10px;
    }

    .modal-text {
      font-size: 16px;
      line-height: 1.4;
      margin-bottom: 20px;
      color: #f5f5f5;
    }

    .modal-btn {
      background: #2ea6ff;
      color: #fff;
      border: none;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s ease, transform 0.1s ease;
    }
    .modal-btn:active {
      transform: scale(0.96);
    }
    .modal-btn-danger {
      background: #f44336;
    }
    .modal-btn-danger:active {
      background: #d32f2f;
    }
    .modal-btn-secondary {
      background: #546e7a;
    }

    .modal-buttons-row {
      display: flex;
      gap: 10px;
    }

    /* === АНИМАЦИИ === */
    .floating-score {
      position: absolute;
      font-weight: 900;
      font-size: 22px;
      pointer-events: none;
      user-select: none;
      z-index: 1000;
      animation: floatUp 0.8s ease-out forwards;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
    }

    @keyframes floatUp {
      0% { opacity: 0; transform: translate(-50%, 0) scale(0.6); }
      30% { opacity: 1; transform: translate(-50%, -20px) scale(1.3); }
      100% { opacity: 0; transform: translate(-50%, -50px) scale(1); }
    }

    .score-bump {
      animation: bump 0.25s ease-out;
    }

    @keyframes bump {
      0% { transform: scale(1); }
      50% { transform: scale(1.25); color: #4caf50; }
      100% { transform: scale(1); color: inherit; }
    }
  </style>
</head>
<body>

  <button id="settings-btn" class="settings-btn" title="Настройки">⚙️</button>
  <button id="menu-tab-btn" class="menu-tab-btn">Меню</button>
  <div class="app-version">v1.0.9</div>

  <div id="score-board">Счет: <span id="score">100</span></div>
  <canvas id="gameCanvas" width="360" height="520"></canvas>
  <div class="hint">Нажми на верхнюю область, чтобы сбросить шарик</div>

  <!-- Окно Меню -->
  <div id="menu-modal" class="modal-overlay">
    <div class="modal-box">
      <button id="close-menu" class="close-btn">&times;</button>
      <div class="modal-title">📋 Меню</div>
      <div style="font-size: 22px; font-weight: 900; color: #ff9800; margin: 18px 0 6px 0; letter-spacing: 1px;">
        COMING SOON
      </div>
      <div style="font-size: 13px; color: #8e9ca8;">Этот раздел находится в разработке</div>
    </div>
  </div>

  <!-- Окно настроек с радужным неоном -->
  <div id="settings-modal" class="modal-overlay">
    <div class="rainbow-modal">
      <button id="close-settings" class="close-btn">&times;</button>
      <div class="modal-title">⚙️ Настройки</div>

      <div class="setting-item">
        <span>Тема оформления:</span>
        <div class="theme-toggle">
          <button id="theme-dark-btn" class="theme-btn active">🌙 Тёмная</button>
          <button id="theme-light-btn" class="theme-btn">☀️ Светлая</button>
        </div>
      </div>

      <div class="danger-zone">
        <div class="danger-header">
          <span>❗</span>
          <span>Опасная зона</span>
        </div>
        <button id="open-confirm-reset" class="modal-btn modal-btn-danger">Сбросить счёт</button>
      </div>
    </div>
  </div>

  <!-- Подтверждение сброса -->
  <div id="confirm-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-text">Точно ли ты хочешь сбросить счёт до 100?</div>
      <div class="modal-buttons-row">
        <button id="confirm-yes" class="modal-btn modal-btn-danger">Да</button>
        <button id="confirm-no" class="modal-btn modal-btn-secondary">Отмена</button>
      </div>
    </div>
  </div>

  <!-- Окно проигрыша -->
  <div id="reset-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-text">Вы потеряли весь счёт, можете сбросить его до 100</div>
      <button id="reset-btn" class="modal-btn">Сбросить до 100</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) tg.expand();

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const scoreBoardEl = document.getElementById('score-board');
    
    // Элементы модальных окон
    const settingsBtn = document.getElementById('settings-btn');
    const settingsModal = document.getElementById('settings-modal');
    const closeSettings = document.getElementById('close-settings');
    const openConfirmReset = document.getElementById('open-confirm-reset');

    const menuTabBtn = document.getElementById('menu-tab-btn');
    const menuModal = document.getElementById('menu-modal');
    const closeMenu = document.getElementById('close-menu');

    const confirmModal = document.getElementById('confirm-modal');
    const confirmYes = document.getElementById('confirm-yes');
    const confirmNo = document.getElementById('confirm-no');

    const resetModal = document.getElementById('reset-modal');
    const resetBtn = document.getElementById('reset-btn');

    const themeDarkBtn = document.getElementById('theme-dark-btn');
    const themeLightBtn = document.getElementById('theme-light-btn');

    let score = 100;
    let saveTimeout = null;
    let currentTheme = localStorage.getItem('plinko_theme') || 'dark';

    // --- УПРАВЛЕНИЕ ТЕМОЙ ---
    function applyTheme(theme) {
      currentTheme = theme;
      localStorage.setItem('plinko_theme', theme);
      if (theme === 'light') {
        document.body.classList.add('light-theme');
        themeDarkBtn.classList.remove('active');
        themeLightBtn.classList.add('active');
      } else {
        document.body.classList.remove('light-theme');
        themeLightBtn.classList.remove('active');
        themeDarkBtn.classList.add('active');
      }
    }

    themeDarkBtn.addEventListener('click', () => applyTheme('dark'));
    themeLightBtn.addEventListener('click', () => applyTheme('light'));
    applyTheme(currentTheme);

    // --- ЛОГИКА МЕНЮ И НАСТРОЕК ---
    menuTabBtn.addEventListener('click', () => {
      menuModal.style.display = 'flex';
    });

    closeMenu.addEventListener('click', () => {
      menuModal.style.display = 'none';
    });

    settingsBtn.addEventListener('click', () => {
      settingsModal.style.display = 'flex';
    });

    closeSettings.addEventListener('click', () => {
      settingsModal.style.display = 'none';
    });

    openConfirmReset.addEventListener('click', () => {
      confirmModal.style.display = 'flex';
    });

    confirmNo.addEventListener('click', () => {
      confirmModal.style.display = 'none';
    });

    confirmYes.addEventListener('click', () => {
      score = 100;
      scoreEl.innerText = score;
      saveScore();
      forceSaveCloud();
      confirmModal.style.display = 'none';
      settingsModal.style.display = 'none';
    });

    // --- ПРОВЕРКА И СБРОС СЧЁТА ---
    function checkGameOver() {
      if (score < 10 && balls.length === 0) {
        resetModal.style.display = 'flex';
      }
    }

    resetBtn.addEventListener('click', () => {
      score = 100;
      scoreEl.innerText = score;
      saveScore();
      resetModal.style.display = 'none';
    });

    // --- СИСТЕМА СОХРАНЕНИЯ ---
    function loadScore() {
      const localSaved = localStorage.getItem('plinko_score');
      if (localSaved !== null) {
        score = parseInt(localSaved, 10);
        scoreEl.innerText = score;
      }

      if (tg?.CloudStorage) {
        tg.CloudStorage.getItem('plinko_score', (err, value) => {
          if (!err && value !== null && value !== undefined) {
            score = parseInt(value, 10);
            scoreEl.innerText = score;
            localStorage.setItem('plinko_score', score.toString());
          }
          checkGameOver();
        });
      } else {
        checkGameOver();
      }
    }

    function saveScore() {
      localStorage.setItem('plinko_score', score.toString());
      if (saveTimeout) clearTimeout(saveTimeout);
      saveTimeout = setTimeout(forceSaveCloud, 500);
    }

    function forceSaveCloud() {
      if (tg?.CloudStorage) {
        tg.CloudStorage.setItem('plinko_score', score.toString(), (err, stored) => {
          if (err) console.error('Ошибка сохранения в CloudStorage:', err);
        });
      }
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        forceSaveCloud();
      }
    });

    loadScore();

    // Настройки сетки и физики
    const ROWS = 7;
    const PEG_RADIUS = 4;
    const BALL_RADIUS = 7;
    const GRAVITY = 0.25;
    const RESTITUTION = 0.5;

    const MULTIPLIERS = [0, 2, 3, 5, 3, 2, 0];
    const COLORS = ['#546e7a', '#ff9800', '#f44336', '#e91e63', '#f44336', '#ff9800', '#546e7a'];

    const pegs = [];
    const startY = 80;
    const rowSpacing = 45;
    const colSpacing = 38;

    for (let r = 0; r < ROWS; r++) {
      const count = r + 3;
      const startX = (canvas.width - (count - 1) * colSpacing) / 2;
      for (let c = 0; c < count; c++) {
        pegs.push({ x: startX + c * colSpacing, y: startY + r * rowSpacing });
      }
    }

    const balls = [];

    canvas.addEventListener('pointerdown', (e) => {
      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;

      if (clickY < 60 && score >= 10) {
        score -= 10;
        scoreEl.innerText = score;
        saveScore();

        balls.push({
          x: clickX,
          y: Math.max(20, clickY),
          vx: (Math.random() - 0.5) * 1.5,
          vy: 0
        });
      }
    });

    function getSlotIndex(x) {
      const slotWidth = canvas.width / MULTIPLIERS.length;
      let idx = Math.floor(x / slotWidth);
      return Math.max(0, Math.min(MULTIPLIERS.length - 1, idx));
    }

    function showFloatingScore(x, y, points, color) {
      const el = document.createElement('div');
      el.className = 'floating-score';
      el.innerText = `+${points}`;
      el.style.color = color;
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      document.body.appendChild(el);

      setTimeout(() => {
        el.remove();
      }, 800);
    }

    function animateScoreDisplay() {
      scoreBoardEl.classList.remove('score-bump');
      void scoreBoardEl.offsetWidth;
      scoreBoardEl.classList.add('score-bump');
    }

    function update() {
      for (let i = balls.length - 1; i >= 0; i--) {
        const b = balls[i];
        b.vy += GRAVITY;
        b.x += b.vx;
        b.y += b.vy;

        if (b.x - BALL_RADIUS < 0) { b.x = BALL_RADIUS; b.vx *= -RESTITUTION; }
        if (b.x + BALL_RADIUS > canvas.width) { b.x = canvas.width - BALL_RADIUS; b.vx *= -RESTITUTION; }

        pegs.forEach(p => {
          const dx = b.x - p.x;
          const dy = b.y - p.y;
          const dist = Math.hypot(dx, dy);
          const minDist = BALL_RADIUS + PEG_RADIUS;

          if (dist < minDist) {
            const angle = Math.atan2(dy, dx);
            const overlap = minDist - dist;
            b.x += Math.cos(angle) * overlap;
            b.y += Math.sin(angle) * overlap;

            const speed = Math.hypot(b.vx, b.vy) * RESTITUTION;
            b.vx = Math.cos(angle) * speed + (Math.random() - 0.5) * 0.5;
            b.vy = Math.sin(angle) * speed;
          }
        });

        if (b.y + BALL_RADIUS >= canvas.height - 40) {
          const slotIdx = getSlotIndex(b.x);
          const mult = MULTIPLIERS[slotIdx];
          const gained = 10 * mult;
          
          score += gained;
          scoreEl.innerText = score;
          saveScore();

          const rect = canvas.getBoundingClientRect();
          const slotWidth = canvas.width / MULTIPLIERS.length;
          const popupX = rect.left + (slotIdx + 0.5) * slotWidth;
          const popupY = rect.top + (canvas.height - 40);

          showFloatingScore(popupX, popupY, gained, COLORS[slotIdx]);
          if (gained > 0) animateScoreDisplay();

          balls.splice(i, 1);
          checkGameOver();
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = currentTheme === 'light' ? '#333333' : '#ffffff';
      pegs.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, PEG_RADIUS, 0, Math.PI * 2);
        ctx.fill();
      });

      const slotWidth = canvas.width / MULTIPLIERS.length;
      MULTIPLIERS.forEach((m, i) => {
        const x = i * slotWidth;
        const y = canvas.height - 40;
        ctx.fillStyle = COLORS[i];
        ctx.fillRect(x + 2, y, slotWidth - 4, 38);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`x${m}`, x + slotWidth / 2, y + 24);
      });

      ctx.save();
      ctx.fillStyle = '#fffb00';
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#fffb00';
      balls.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, BALL_RADIUS, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.restore();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
