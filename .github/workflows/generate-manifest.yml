name: Generate Assets Manifest

on:
  push:
    branches:
      - main  # Запуск при пуше в main
  workflow_dispatch: # Позволяет запускать вручную из вкладки Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate manifest.json
        run: |
          cd assets || exit 1
          # Собираем список всех изображений в JSON-массив
          files=$(ls *.jpg *.png 2>/dev/null | jq -R . | jq -s .)
          echo "$files" > manifest.json

      - name: Commit and push manifest
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/manifest.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generate manifest.json" && git push)
          
